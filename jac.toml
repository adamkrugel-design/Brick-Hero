[project]
name = "jactastic"
version = "1.0.0"
description = "Jac client application: jactastic"
entry-point = "main.jac"

[dependencies.npm]
"@tailwindcss/vite" = "^4.1.17"
tailwindcss = "^4.1.17"
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[serve]
base_route_app = "app"

[jacpack]
name = "lego_piece_image_recognition"
description = "Jac IDE snapshot for lego_piece_image_recognition"
